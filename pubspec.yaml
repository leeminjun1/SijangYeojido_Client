name: sijangyeojido_client
description: "시장여지도 - Traditional Market Guide App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path_drawing: ^1.0.1
  provider: ^6.1.5+1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/market_hero.png
    - assets/images/kakao_logo.png
    - assets/images/google_logo.png
    - assets/images/category_meat_3d_cute.png
    - assets/images/category_fish_3d_cute.png
    - assets/images/category_veggie_3d_cute.png
    - assets/images/category_snack_3d_cute.png
    - assets/images/category_dried_fish_3d.png
    - assets/images/category_etc_3d.png
    - assets/images/category_meal_3d.png
    - assets/images/market_building.png
    - assets/images/hero_3d_pin.png
    - assets/images/sinwon_market_2x.png
